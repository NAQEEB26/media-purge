name: Bug report
description: Report a problem with Media Purge
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. For general how-to questions, use the [WordPress.org support forum](https://wordpress.org/support/plugin/media-purge/).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to Media → Media Purge
        2. Click ...
        3. See error
    validations:
      required: true

  - type: input
    id: wp_version
    attributes:
      label: WordPress version
    validations:
      required: true

  - type: input
    id: php_version
    attributes:
      label: PHP version
    validations:
      required: true

  - type: input
    id: plugin_version
    attributes:
      label: Media Purge version
      placeholder: e.g. 1.4.6
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / errors
      description: Paste console or PHP error messages if any
